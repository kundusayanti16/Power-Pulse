<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💡</text></svg>">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
<nav class="navbar">
  <a href="index.html" class="nav-brand">
    <span class="bolt">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-yellow);">
        <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path>
        <line x1="9" y1="18" x2="15" y2="18"></line>
        <line x1="10" y1="22" x2="14" y2="22"></line>
      </svg>
    </span>
    <span>Lumina</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
</nav>

<div class="auth-wrapper">
  <div class="card auth-card">
    <h1 class="auth-title">🔒 Reset Password</h1>
    <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1.5rem;">Enter your email to receive a 6-digit OTP.</p>
    
    <form id="forgot-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="f-email" placeholder="Enter your registered email" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="f-btn">Send OTP</button>
    </form>

    <form id="reset-form" style="display:none; margin-top:2rem; border-top:1px solid var(--border-glow); padding-top:2rem;">
      <div class="form-group">
        <label>Enter 6-Digit OTP</label>
        <input type="text" id="r-otp" placeholder="000000" maxlength="6" required />
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="r-pass" placeholder="Min 6 characters" required />
      </div>
      <button type="submit" class="btn btn-warning btn-block" id="r-btn">Reset Password</button>
    </form>

    <div class="auth-footer">
      Remembered? <a href="login.html">Login here</a>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
